spring:
  application:
    name: epigramsite

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    show-sql: true

  # Colored logging
  output:
    ansi:
      enabled: always